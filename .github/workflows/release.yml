name: Android Release (Tag)

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check signing secrets
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          if [ -z "$SIGNING_KEYSTORE_BASE64" ]; then echo "Missing secret: SIGNING_KEYSTORE_BASE64"; exit 1; fi
          if [ -z "$SIGNING_STORE_PASSWORD" ]; then echo "Missing secret: SIGNING_STORE_PASSWORD"; exit 1; fi
          if [ -z "$SIGNING_KEY_ALIAS" ]; then echo "Missing secret: SIGNING_KEY_ALIAS"; exit 1; fi
          if [ -z "$SIGNING_KEY_PASSWORD" ]; then echo "Missing secret: SIGNING_KEY_PASSWORD"; exit 1; fi

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/release.keystore"

      - name: Build Release APK
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease

      - name: Prepare artifact name
        id: prep
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "apk=app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Nostalgia-AI ${{ steps.prep.outputs.tag }}
          tag_name: ${{ steps.prep.outputs.tag }}
          files: |
            ${{ steps.prep.outputs.apk }}
          generate_release_notes: true
